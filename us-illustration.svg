  <circle cx="160" cy="160" r="155" fill="url(#bgGlow)"/>

  <!-- small floating hearts -->
  <path d="M60 60 C 56 52, 45 52, 43 62 C 41 72, 52 78, 60 86 C 68 78, 79 72, 77 62 C 75 52, 64 52, 60 60 Z" fill="#FFC2D4" opacity="0.8"/>
  <path d="M260 60 C 256 52, 245 52, 243 62 C 241 72, 252 78, 260 86 C 268 78, 279 72, 277 62 C 275 52, 264 52, 260 60 Z" fill="#FFC2D4" opacity="0.7"/>
  <path d="M260 240 C 256 233, 246 233, 244 242 C 242 251, 251 257, 260 264 C 269 257, 278 251, 276 242 C 274 233, 264 233, 260 240 Z" fill="#FFB8CD" opacity="0.6"/>
  <path d="M60 240 C 56 233, 46 233, 44 242 C 42 251, 51 257, 60 264 C 69 257, 78 251, 76 242 C 74 233, 64 233, 60 240 Z" fill="#FFB8CD" opacity="0.6"/>

  <!-- left heart (E) -->
