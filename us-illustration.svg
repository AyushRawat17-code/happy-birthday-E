  <!-- initials -->
  <text x="103" y="183" text-anchor="middle" font-family="'Signika', sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">E</text>
  <text x="217" y="183" text-anchor="middle" font-family="'Signika', sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">A</text>

  <!-- caption -->
  <text x="160" y="270" text-anchor="middle" font-family="'Signika', sans-serif" font-size="20" fill="#C2456E">Forever &amp; Always</text>
